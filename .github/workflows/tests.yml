name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # No dependencies to install — the project is standard-library only.
      - name: Run regression suite
        run: python3 tests/test_fixtures.py
